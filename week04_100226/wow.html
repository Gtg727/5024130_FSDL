<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>JavaScript Demo with Bootstrap</title>

  <!-- Bootstrap CSS (CDN) -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >

  <style>
    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .card {
      border-radius: 20px;
      box-shadow: 0 15px 30px rgba(0, 0, 0, 0.3);
    }

    .counter {
      font-size: 3rem;
      font-weight: bold;
      color: #0d6efd;
    }

    .btn-custom {
      padding: 12px 30px;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

  <div class="card text-center p-4" style="width: 22rem;">
    <div class="card-body">
      <h2 class="card-title mb-3">🚀 Click Counter</h2>
      <p class="card-text">
        You clicked the button
        <span id="count" class="counter">0</span>
        times
      </p>

      <button class="btn btn-primary btn-custom mt-3" onclick="increment()">
        Click me
      </button>

      <button class="btn btn-outline-secondary btn-sm mt-3" onclick="reset()">
        Reset
      </button>
    </div>
  </div>

  <script>
    let count = 0;

    function increment() {
      count++;
      document.getElementById("count").textContent = count;
    }

    function reset() {
      count = 0;
      document.getElementById("count").textContent = count;
    }
  </script>

</body>
</html>
